<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carousel Swipe Images from JSON</title>
    <link
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .carousel-inner img {
        max-width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div
        id="carouselExampleIndicators"
        class="carousel slide"
        data-ride="carousel"
        data-interval="600000"
      >
        <ol class="carousel-indicators" id="carousel-indicators"></ol>
        <div class="carousel-inner" id="carousel-inner"></div>
        <div id="countdown" class="carousel-caption"></div>
        <!-- Countdown timer -->
        <a
          class="carousel-control-prev"
          href="#carouselExampleIndicators"
          role="button"
          data-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="sr-only">Previous</span>
        </a>
        <a
          class="carousel-control-next"
          href="#carouselExampleIndicators"
          role="button"
          data-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="sr-only">Next</span>
        </a>
      </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
      $(document).ready(function () {
        $.getJSON("data.json", function (data) {
          $.each(data, function (index, image) {
            var indicator = $(
              '<li data-target="#carouselExampleIndicators" data-slide-to="' +
                index +
                '"></li>'
            );
            $("#carousel-indicators").append(indicator);

            var item = $(
              '<div class="carousel-item"><img src="' +
                image.path +
                image.namafile +
                '" class="d-block w-100" alt="' +
                image.namafile +
                '"></div>'
            );
            if (index === 0) {
              item.addClass("active");
              indicator.addClass("active");
            }
            $("#carousel-inner").append(item);
          });

          // Countdown timer
          var countDownDate = new Date().getTime() + 600000; // 10 minutes from now
          var x = setInterval(function () {
            var now = new Date().getTime();
            var distance = countDownDate - now;
            var minutes = Math.floor(
              (distance % (1000 * 60 * 60)) / (1000 * 60)
            );
            var seconds = Math.floor((distance % (1000 * 60)) / 1000);
            console.log(seconds);
            $("#countdown").text(
              "Time left: " + minutes + "m " + seconds + "s "
            );
            if (distance < 0) {
              clearInterval(x);
              $("#countdown").text("EXPIRED");
            }
          }, 1000);
        });
      });
    </script>
  </body>
</html>
